name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (portable)
        run: npx cross-env ELECTRON_DIST=1 vite build && npx cross-env ELECTRON_DIST=1 electron-builder --win portable --publish never

      - name: Build Windows setup installer
        run: node scripts/build-setup-only.js

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/Encryptic Movies.exe
            dist/Encryptic Movies Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux packages
        run: npx cross-env ELECTRON_DIST=1 vite build && npx cross-env ELECTRON_DIST=1 electron-builder --linux AppImage deb --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.AppImage
            dist/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npx cross-env ELECTRON_DIST=1 vite build && npm run dist:mac

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.dmg

  publish:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Encryptic Movies ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/**/*
